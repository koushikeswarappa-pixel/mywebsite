<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div class="logo">Creative Touch</div>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="contact-grid">

<div class="contact-box">
<h2>Send Message</h2>

<form id="contactForm">
<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required>
<input type="text" id="phone" placeholder="Phone Number">
<textarea id="message" rows="6" placeholder="Your Message" required></textarea>
<button type="submit">Send Message</button>
</form>

<p id="status"></p>
</div>

<div class="contact-box">
<h2>Office Details</h2>

<p><strong>Address:</strong> Bengaluru, Karnataka, India</p>
<p><strong>Phone:</strong> +91 9876543210</p>
<p><strong>Email:</strong> info@creativetouch.com</p>

<iframe class="map-box"
src="https://www.google.com/maps?q=Bangalore&output=embed">
</iframe>

</div>

</section>

<footer>
<p>© 2026 Creative Touch</p>
</footer>

<script src="script.js"></script>
</body>
</html>
