<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Touch</title>

<link rel="stylesheet" href="styles.css">

</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">CreativeTouch</div>

  <nav id="nav">
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>

  <div id="menu-btn">☰</div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>We Build Beautiful Spaces</h1>
    <p>Interior Design • Architecture • Construction</p>
    <button>Get Started</button>
  </div>
</section>

<!-- SERVICES -->
<section id="services" class="section">
  <h2>Our Services</h2>

  <div class="cards">
    <div class="card">Interior Design</div>
    <div class="card">Architecture</div>
    <div class="card">Construction</div>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="section dark">
  <h2>Our Projects</h2>

  <div class="cards">
    <div class="project"></div>
    <div class="project"></div>
    <div class="project"></div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2>Contact Us</h2>

  <form id="form">
    <input id="name" placeholder="Name" required>
    <input id="email" placeholder="Email" required>
    <textarea id="message" placeholder="Message"></textarea>
    <button>Send</button>
  </form>
</section>

<footer>
  <p>© 2026 CreativeTouch</p>
</footer>

<script src="script.js"></script>
</body>
</html>
