<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Touch</title>

<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <h2>CreativeTouch</h2>

  <nav id="nav">
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <h1>Design Your Dream Space</h1>
    <p>Luxury Interior • Architecture • Living</p>
  </div>
</section>

<!-- SERVICES -->
<section id="services" class="section">
  <h2>Our Services</h2>

  <div class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6">
      <h3>Interior Design</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
      <h3>Architecture</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600585152915-d208bec867a1">
      <h3>Construction</h3>
    </div>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="section dark">
  <h2>Our Projects</h2>

  <div class="cards">
    <div class="project" style="background-image:url('https://images.unsplash.com/photo-1600607687939-ce8a6c25118c')"></div>
    <div class="project" style="background-image:url('https://images.unsplash.com/photo-1600210492486-724fe5c67fb0')"></div>
    <div class="project" style="background-image:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c')"></div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2>Contact Us</h2>

  <form id="form">
    <input id="name" placeholder="Name" required>
    <input id="email" placeholder="Email" required>
    <textarea id="message" placeholder="Message"></textarea>
    <button>Send</button>
  </form>
</section>

<footer>
  <p>© 2026 CreativeTouch</p>
</footer>

<script src="script.js"></script>
</body>
</html>
