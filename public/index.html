<!DOCTYPE html>
<html>
<head>
<title>Creative Innovation</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

</head>
<body>

<header class="navbar">
  <div class="logo">
    <img src="logo.png">
    <span>Creative Innovation</span>
  </div>

  <nav>
    <ul class="menu">
      <li><a href="#">Home</a></li>

      <li class="dropdown">
        <a href="#">Services ▾</a>
        <ul class="dropdown-menu">
          <li><a href="#">Interior</a></li>
          <li><a href="#">Architecture</a></li>
          <li><a href="#">Construction</a></li>
        </ul>
      </li>

      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <h1>Designing Future Spaces</h1>
    <p>Creative • Modern • Smart Living</p>
    <button onclick="scrollToSection()">Explore</button>
  </div>
</section>

<!-- SERVICES -->
<section class="section">
  <h2>Our Services</h2>

  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=800&q=90">
      <h3>Interior Design</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?w=800&q=90">
      <h3>Architecture</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=800&q=90">
      <h3>Construction</h3>
    </div>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="section dark">
  <h2>Our Projects</h2>

  <div class="grid">
    <div class="project" style="background-image:url('https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=1200&q=90')"></div>
    <div class="project" style="background-image:url('https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?w=1200&q=90')"></div>
    <div class="project" style="background-image:url('https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=1200&q=90')"></div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2>Contact Us</h2>

  <form id="form">
    <input id="name" placeholder="Name" required>
    <input id="email" placeholder="Email" required>
    <textarea id="message" placeholder="Message"></textarea>
    <button>Send</button>
  </form>
</section>

<footer>
  <p>© 2026 Creative Innovation</p>
</footer>

<script src="script.js"></script>
</body>
</html>
